{% extends "base.html" %}

{% block content %}
  <h1 class="mb-3">Editar paciente</h1>
  <p class="text-muted mb-4">
    Atualize as informações do paciente selecionado.
  </p>

  <div class="card">
    <div class="card-body">
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="nome">Nome</label>
            <input type="text" class="form-control" id="nome" name="nome" required
                   value="{{ paciente.nome }}">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="telefone">Telefone</label>
            <input type="text" class="form-control" id="telefone" name="telefone"
                   value="{{ paciente.telefone }}">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="data_nascimento">Data de nascimento</label>
            <input type="date" class="form-control" id="data_nascimento" name="data_nascimento"
                   value="{{ paciente.data_nascimento }}">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="sexo">Sexo</label>
            <select class="form-select" id="sexo" name="sexo">
              <option value="" {% if not paciente.sexo %}selected{% endif %}>Selecione</option>
              <option value="Feminino" {% if paciente.sexo == 'Feminino' %}selected{% endif %}>Feminino</option>
              <option value="Masculino" {% if paciente.sexo == 'Masculino' %}selected{% endif %}>Masculino</option>
              <option value="Outro" {% if paciente.sexo == 'Outro' %}selected{% endif %}>Outro</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="diagnostico">Diagnóstico clínico</label>
            <input type="text" class="form-control" id="diagnostico" name="diagnostico"
                   value="{{ paciente.diagnostico }}">
          </div>
          <div class="col-md-5">
            <label class="form-label" for="queixa_principal">Queixa principal</label>
            <input type="text" class="form-control" id="queixa_principal" name="queixa_principal"
                   value="{{ paciente.queixa_principal }}">
          </div>
          <div class="col-12">
            <label class="form-label" for="observacoes">Observações</label>
            <textarea class="form-control" id="observacoes" name="observacoes" rows="3">{{ paciente.observacoes }}</textarea>
          </div>
        </div>
        <div class="mt-3 d-flex gap-2">
          <button type="submit" class="btn btn-primary">Salvar</button>
          <a href="{{ url_for('pacientes') }}" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>

{% endblock %}
